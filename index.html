<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adupuli Online - 3x3 Multiplayer</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 { color: #ffd700; text-shadow: 2px 2px 4px #000; margin: 10px 0; }
      .rule {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 11px;
            margin: 5px 0;
            text-align: center;
        }
      .status {
            background: rgba(0,0,0,0.3);
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            margin: 15px 0;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
      .board {
            position: relative;
            width: 300px;
            height: 300px;
            background: #f4a460;
            border: 5px solid #8b4513;
            border-radius: 15px;
            margin: 20px 0;
        }
      .line { position: absolute; background: #8b4513; }
      .h-line { width: 100%; height: 4px; left: 0; }
      .v-line { width: 4px; height: 100%; top: 0; }
      .point {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #fff;
            border: 4px solid #8b4513;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            transform: translate(-50%, -50%);
            transition: all 0.2s;
        }
      .point:hover { transform: translate(-50%, -50%) scale(1.1); }
      .point.selected { border-color: #ffd700; box-shadow: 0 0 15px #ffd700; }
      .point.highlight { background: #90ee90; }
      .coin {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 3px solid #000;
            pointer-events: none;
        }
      .p1 { background: #e74c3c; }
      .p2 { background: #3498db; }
      .legend {
            display: flex;
            gap: 30px;
            margin: 10px 0;
            font-size: 16px;
        }
      .legend-item { display: flex; align-items: center; gap: 8px; }
      .menu-screen,.game-screen,.waiting-screen { display: none; width: 100%; max-width: 400px; }
      .menu-screen.active,.game-screen.active,.waiting-screen.active { display: flex; flex-direction: column; align-items: center; }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            background: #ff6b6b;
            color: white;
            transition: all 0.3s;
        }
        button:hover { background: #ff5252; transform: translateY(-2px); }
      .btn-secondary { background: #4ecdc4; }
      .room-code {
            font-size: 2em;
            font-weight: bold;
            letter-spacing: 5px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin: 15px 0;
            border: 2px dashed rgba(255,255,255,0.3);
        }
      .win-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px 50px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <h1>🐅 Adupuli Online 🐐</h1>
    
    <!-- Menu Screen -->
    <div class="menu-screen active" id="menuScreen">
        <div class="rule">📌 3x3 Board | 2 Player Online | One Step Move</div>
        <button onclick="createRoom()">🎮 Create Room</button>
        <div style="margin: 15px 0; opacity: 0.5;">OR</div>
        <input type="text" id="joinCode" placeholder="ENTER CODE" maxlength="6">
        <button class="btn-secondary" onclick="joinRoom()">🚪 Join Room</button>
    </div>

    <!-- Waiting Screen -->
    <div class="waiting-screen" id="waitingScreen">
        <div class="room-code" id="roomCodeDisplay">------</div>
        <button class="btn-secondary" onclick="copyCode()">📋 Copy Code</button>
        <div class="status">Waiting for Player 2...</div>
        <button onclick="cancelRoom()">Cancel</button>
    </div>

    <!-- Game Screen -->
    <div class="game-screen" id="gameScreen">
        <div class="rule">📌 Rule: Straight la poga mudiyum | Nadula coin irundha thandi poga koodadhu</div>
        <div class="legend">
            <div class="legend-item"><div class="coin p1"></div> <span id="p1Label">You</span></div>
            <div class="legend-item"><div class="coin p2"></div> <span id="p2Label">Opponent</span></div>
        </div>
        <div class="status" id="status">Connecting...</div>
        <div class="board" id="board">
            <div class="line h-line" style="top: 50px;"></div>
            <div class="line h-line" style="top: 150px;"></div>
            <div class="line h-line" style="top: 250px;"></div>
            <div class="line v-line" style="left: 50px;"></div>
            <div class="line v-line" style="left: 150px;"></div>
            <div class="line v-line" style="left: 250px;"></div>
        </div>
        <button onclick="leaveRoom()">🚪 Leave Room</button>
    </div>

    <div class="win-msg" id="winMsg"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue, update, remove, get } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAFBQhNDokxJU1JLUEuvBfJdrTT9xy22-e8",
            authDomain: "coins-8a917.firebaseapp.com",
            databaseURL: "https://coins-8a917-default-rtdb.firebaseio.com",
            projectId: "coins-8a917",
            storageBucket: "coins-8a917.firebasestorage.app",
            messagingSenderId: "1042852644756",
            appId: "1:1042852644756:web:2759d89e5883d29a073181"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let roomId = null;
        let playerId = 'player_' + Math.random().toString(36).substr(2, 9);
        let myPlayer = null;
        let gameData = null;

        const positions = {
            1: [50, 50], 2: [150, 50], 3: [250, 50],
            4: [50, 150], 5: [150, 150], 6: [250, 150],
            7: [50, 250], 8: [150, 250], 9: [250, 250]
        };

        const adjacent = {
            1: [2, 4], 2: [1, 3, 5], 3: [2, 6],
            4: [1, 5, 7], 5: [2, 4, 6, 8], 6: [3, 5, 9],
            7: [4, 8], 8: [5, 7, 9], 9: [6, 8]
        };

        const winCombos = [
            [1,2,3], [4,5,6], [7,8,9],
            [1,4,7], [2,5,8], [3,6,9]
        ];

        window.createRoom = async function() {
            roomId = Math.random().toString(36).substr(2, 6).toUpperCase();
            myPlayer = 'p1';
            
            const initialState = {
                board: {},
                currentPlayer: 'p1',
                phase: 'place',
                coinsPlaced: { p1: 0, p2: 0 },
                players: { [playerId]: { player: 'p1' } },
                status: 'waiting',
                winner: null
            };

            await set(ref(db, 'rooms3x3/' + roomId), initialState);
            document.getElementById('menuScreen').classList.remove('active');
            document.getElementById('waitingScreen').classList.add('active');
            document.getElementById('roomCodeDisplay').textContent = roomId;
            listenToRoom();
        }

        window.joinRoom = async function() {
            const code = document.getElementById('joinCode').value.trim().toUpperCase();
            if (code.length!== 6) { alert('Enter 6 digit code da'); return; }

            const roomRef = ref(db, 'rooms3x3/' + code);
            const snapshot = await get(roomRef);
            if (!snapshot.exists()) { alert('Room not found da!'); return; }
            if (Object.keys(snapshot.val().players || {}).length >= 2) { alert('Room full da!'); return; }

            roomId = code;
            myPlayer = 'p2';
            await update(roomRef, {
                [`players/${playerId}`]: { player: 'p2' },
                status: 'playing'
            });
            startGame();
        }

        function listenToRoom() {
            onValue(ref(db, 'rooms3x3/' + roomId), (snapshot) => {
                gameData = snapshot.val();
                if (!gameData) { alert('Room closed da'); location.reload(); return; }
                
                if (gameData.status === 'waiting' && Object.keys(gameData.players || {}).length >= 2) {
                    document.getElementById('waitingScreen').classList.remove('active');
                    document.getElementById('gameScreen').classList.add('active');
                    updateLabels();
                }
                if (gameData.status === 'playing') {
                    createPoints();
                    updateBoard();
                    updateStatus();
                    checkWin();
                }
            });
        }

        function startGame() {
            document.getElementById('menuScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');
            updateLabels();
            listenToRoom();
        }

        function updateLabels() {
            if (myPlayer === 'p1') {
                document.getElementById('p1Label').textContent = 'You';
                document.getElementById('p2Label').textContent = 'Opponent';
            } else {
                document.getElementById('p1Label').textContent = 'Opponent';
                document.getElementById('p2Label').textContent = 'You';
            }
        }

        function createPoints() {
            const board = document.getElementById('board');
            board.querySelectorAll('.point').forEach(p => p.remove());
            for (let i = 1; i <= 9; i++) {
                const point = document.createElement('div');
                point.className = 'point';
                point.dataset.pos = i;
                point.style.left = positions[i][0] + 'px';
                point.style.top = positions[i][1] + 'px';
                point.textContent = i;
                point.onclick = () => handleClick(i);
                board.appendChild(point);
            }
        }

        function canMove(from, to) {
            if (gameData.board[to]) return false;
            return adjacent[from].includes(to);
        }

        function getValidMoves(pos) {
            return adjacent[pos].filter(p =>!gameData.board[p]);
        }

        function updateBoard() {
            document.querySelectorAll('.point').forEach(p => {
                const pos = parseInt(p.dataset.pos);
                p.innerHTML = pos;
                p.classList.remove('selected', 'highlight');
                if (gameData.board[pos]) {
                    const coin = document.createElement('div');
                    coin.className = `coin ${gameData.board[pos]}`;
                    p.innerHTML = '';
                    p.appendChild(coin);
                }
            });
            if (gameData.selectedCoin) {
                document.querySelector(`[data-pos="${gameData.selectedCoin}"]`).classList.add('selected');
                getValidMoves(gameData.selectedCoin).forEach(move => {
                    document.querySelector(`[data-pos="${move}"]`).classList.add('highlight');
                });
            }
        }

        function checkWin() {
            if (gameData.winner) {
                const winMsg = document.getElementById('winMsg');
                winMsg.textContent = gameData.winner === myPlayer? '🎉 You Win! 🎉' : '😢 You Lose! 😢';
                winMsg.style.display = 'block';
                return;
            }
            for (let player of ['p1', 'p2']) {
                if (winCombos.some(combo => combo.every(pos => gameData.board[pos] === player))) {
                    update(ref(db, 'rooms3x3/' + roomId), { winner: player });
                    return;
                }
            }
        }

        function updateStatus() {
            const status = document.getElementById('status');
            if (gameData.winner) return;
            if (gameData.phase === 'place') {
                const count = gameData.coinsPlaced[myPlayer] || 0;
                if (gameData.currentPlayer === myPlayer) {
                    status.textContent = `Your turn: Coin veiku da (${3 - count} left)`;
                } else {
                    status.textContent = 'Opponent turn...';
                }
            } else {
                if (gameData.currentPlayer === myPlayer) {
                    status.textContent = gameData.selectedCoin? 'Poga mudiyura idathu la click pannu da' : 'Your turn: Coin ah move pannu da';
                } else {
                    status.textContent = 'Opponent turn...';
                }
            }
        }

        async function handleClick(pos) {
            if (!gameData || gameData.winner || gameData.currentPlayer!== myPlayer) return;
            pos = parseInt(pos);

            if (gameData.phase === 'place') {
                if (gameData.board[pos]) return;
                const newCoinsPlaced = {...gameData.coinsPlaced};
                newCoinsPlaced[myPlayer] = (newCoinsPlaced[myPlayer] || 0) + 1;
                const updates = {
                    [`board/${pos}`]: myPlayer,
                    coinsPlaced: newCoinsPlaced
                };
                if (newCoinsPlaced.p1 === 3 && newCoinsPlaced.p2 === 3) {
                    updates.phase = 'move';
                    updates.currentPlayer = 'p1';
                } else {
                    updates.currentPlayer = myPlayer === 'p1'? 'p2' : 'p1';
                }
                await update(ref(db, 'rooms3x3/' + roomId), updates);
                return;
            }

            if (gameData.phase === 'move') {
                if (gameData.board[pos] === myPlayer) {
                    const newSelected = gameData.selectedCoin === pos? null : pos;
                    await update(ref(db, 'rooms3x3/' + roomId), { selectedCoin: newSelected });
                }
                else if (gameData.selectedCoin && canMove(gameData.selectedCoin, pos)) {
                    const updates = {
                        [`board/${pos}`]: myPlayer,
                        [`board/${gameData.selectedCoin}`]: null,
                        selectedCoin: null,
                        currentPlayer: myPlayer === 'p1'? 'p2' : 'p1'
                    };
                    await update(ref(db, 'rooms3x3/' + roomId), updates);
                }
            }
        }

        window.copyCode = function() {
            navigator.clipboard.writeText(roomId);
            alert('Code copied da! ' + roomId);
        }
        window.cancelRoom = async function() {
            if (roomId) await remove(ref(db, 'rooms3x3/' + roomId));
            location.reload();
        }
        window.leaveRoom = async function() {
            if (roomId) await remove(ref(db, 'rooms3x3/' + roomId));
            location.reload();
        }
        window.addEventListener('beforeunload', () => {
            if (roomId) remove(ref(db, 'rooms3x3/' + roomId));
        });
    </script>
</body>
</html>
